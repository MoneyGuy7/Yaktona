<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌙 Eid Wishlist</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins,sans-serif;
background:linear-gradient(180deg,#020202,#111);
color:white;
text-align:center;
}

h1{
font-family:Cinzel,serif;
color:#FFD700;
margin-top:40px;
}

.inputBox{
margin:25px auto;
max-width:500px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
padding:14px 18px;
border:none;
background:#FFD700;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.grid{
max-width:1000px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:10px;
}

.card{
background:#1b1b1b;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 20px rgba(255,215,0,.2);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.content{
padding:15px;
}

.share{
margin:30px;
background:#111;
padding:12px;
border-radius:10px;
word-break:break-all;
}

</style>
</head>

<body>

<h1>🌙 My Eid Wishlist</h1>
<p>Paste a product link</p>

<div class="inputBox">
<input id="linkInput" placeholder="Paste eBay / Amazon link...">
<button onclick="addLink()">Add</button>
</div>

<div class="share">
<b>Share this wishlist:</b>
<div id="shareLink"></div>
</div>

<div class="grid" id="list"></div>

<script>

let items=[];

/* LOAD FROM SHARE LINK */
function load(){
const hash=location.hash.slice(1);
if(hash){
try{
items=JSON.parse(decodeURIComponent(atob(hash)));
}catch{}
}
}

/* UPDATE SHARE URL */
function updateLink(){
const encoded=btoa(encodeURIComponent(JSON.stringify(items)));
const url=location.origin+location.pathname+"#"+encoded;
document.getElementById("shareLink").innerText=url;
history.replaceState(null,null,"#"+encoded);
}

/* CREATE CARD */
function render(){
const list=document.getElementById("list");
list.innerHTML="";

items.forEach(link=>{
list.innerHTML+=`
<div class="card">
<img src="https://api.microlink.io/?url=${encodeURIComponent(link)}&screenshot=true&meta=false&embed=screenshot.url">
<div class="content">
<a href="${link}" target="_blank">Open Product</a>
</div>
</div>`;
});

updateLink();
}

/* ADD LINK */
function addLink(){
const link=document.getElementById("linkInput").value;
if(!link) return;

items.push(link);
document.getElementById("linkInput").value="";
render();
}

load();
render();

</script>

</body>
</html>
