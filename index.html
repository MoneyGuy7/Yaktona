<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌙 My Eid Wishlist</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(180deg,#0b0f1a,#111827);
    color:white;
}

/* Header */
header{
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-family:'Cinzel',serif;
    font-size:42px;
    color:#FFD700;
}

header p{
    opacity:0.8;
}

/* Crescent decoration */
.moon{
    font-size:40px;
    margin-bottom:10px;
}

/* Grid */
.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

/* Cards */
.card{
    background:#1f2937;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(255,215,0,0.15);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 30px rgba(255,215,0,0.4);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin:5px 0;
    color:#FFD700;
}

.price{
    font-weight:bold;
    margin:8px 0;
}

.buy-btn{
    display:inline-block;
    padding:10px 15px;
    background:#FFD700;
    color:black;
    border-radius:8px;
    text-decoration:none;
    font-weight:600;
}

.buy-btn:hover{
    background:white;
}

/* Footer */
footer{
    text-align:center;
    padding:25px;
    opacity:0.6;
}

</style>
</head>

<body>

<header>
<div class="moon">🌙</div>
<h1>My Eid Wishlist</h1>
<p>✨ Presents I'd love this Eid ✨</p>
</header>

<div class="container">

<!-- ITEM 1 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<div class="card-content">
<h3>New Laptop</h3>
<p>For school & projects</p>
<div class="price">$899</div>
<a class="buy-btn" href="https://example.com" target="_blank">View Gift</a>
</div>
</div>

<!-- ITEM 2 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<div class="card-content">
<h3>Wireless Headphones</h3>
<p>Noise cancelling headphones</p>
<div class="price">$199</div>
<a class="buy-btn" href="https://example.com" target="_blank">View Gift</a>
</div>
</div>

<!-- ITEM 3 -->
<div class="card">
<img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12">
<div class="card-content">
<h3>Smart Watch</h3>
<p>Fitness & daily use</p>
<div class="price">$149</div>
<a class="buy-btn" href="https://example.com" target="_blank">View Gift</a>
</div>
</div>

</div>

<footer>
🌙 Eid Mubarak 🌙
</footer>

</body>
</html>
